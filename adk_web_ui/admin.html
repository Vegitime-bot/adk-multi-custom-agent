<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADK Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .stat-card { transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .chart-container { position: relative; height: 300px; }
        .table-row-hover:hover { background-color: #f8fafc; }
        .btn-animate { transition: all 0.2s ease; }
        .btn-animate:hover { transform: scale(1.05); }
        .btn-animate:active { transform: scale(0.95); }
        .search-input:focus { box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        .tab-active { border-bottom: 2px solid #6366f1; color: #6366f1; }
        .tab-inactive { color: #6b7280; border-bottom: 2px solid transparent; }
        .tab-inactive:hover { color: #374151; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <!-- Header -->
    <header class="glass sticky top-0 z-50 border-b border-slate-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                        <i class="fas fa-robot text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold gradient-text">ADK Admin Dashboard</h1>
                        <p class="text-xs text-slate-500">Multi-Agent System Management</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <i class="fas fa-user-shield absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="knoxIdInput" placeholder="Knox ID 입력" 
                            class="search-input pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 w-64">
                    </div>
                    <button onclick="loadAdminData()" class="btn-animate bg-indigo-600 text-white px-4 py-2.5 rounded-lg font-medium hover:bg-indigo-700 flex items-center gap-2">
                        <i class="fas fa-sign-in-alt"></i>
                        <span>로그인</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Login Message -->
        <div id="loginMessage" class="hidden fade-in">
            <div class="bg-amber-50 border border-amber-200 rounded-xl p-6 text-center">
                <div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-lock text-amber-600 text-2xl"></i>
                </div>
                <h3 class="text-lg font-semibold text-amber-900 mb-2">관리자 인증 필요</h3>
                <p class="text-amber-700">관리자 Knox ID를 입력하고 로그인하세요</p>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="hidden">
            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4 mb-8" id="statsGrid">
                <!-- Stats will be loaded here -->
            </div>

            <!-- Charts Row -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                <!-- Activity Chart -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-semibold text-slate-800">
                            <i class="fas fa-chart-line text-indigo-500 mr-2"></i>활동 추이
                        </h3>
                        <select id="chartPeriod" onchange="updateActivityChart()" class="text-sm border border-slate-200 rounded-lg px-3 py-1.5 focus:outline-none focus:border-indigo-500">
                            <option value="24h">24시간</option>
                            <option value="7d" selected>7일</option>
                            <option value="30d">30일</option>
                        </select>
                    </div>
                    <div class="chart-container">
                        <canvas id="activityChart"></canvas>
                    </div>
                </div>

                <!-- Agent Usage Chart -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-semibold text-slate-800">
                            <i class="fas fa-chart-pie text-purple-500 mr-2"></i>Agent 사용량
                        </h3>
                    </div>
                    <div class="chart-container">
                        <canvas id="agentUsageChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Sessions Section -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <!-- Tabs & Search -->
                <div class="border-b border-slate-200 px-6 py-4">
                    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                        <div class="flex items-center gap-6">
                            <button onclick="switchTab('sessions')" id="tab-sessions" class="tab-active pb-2 text-sm font-medium transition-colors">
                                <i class="fas fa-comments mr-2"></i>세션 목록
                            </button>
                            <button onclick="switchTab('users')" id="tab-users" class="tab-inactive pb-2 text-sm font-medium transition-colors">
                                <i class="fas fa-users mr-2"></i>사용자 목록
                            </button>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="relative">
                                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                                <input type="text" id="searchInput" placeholder="검색..." 
                                    class="search-input pl-9 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 focus:bg-white w-64"
                                    oninput="handleSearch()">
                            </div>
                            <select id="searchFilter" class="text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:border-indigo-500 bg-white">
                                <option value="all">전체</option>
                                <option value="session_id">세션 ID</option>
                                <option value="knox_id">사용자</option>
                                <option value="agent">Agent</option>
                            </select>
                            <button onclick="exportData()" class="btn-animate bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-emerald-700 flex items-center gap-2">
                                <i class="fas fa-download"></i>내보내기
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Table Content -->
                <div id="tableContent">
                    <div class="flex items-center justify-center py-20">
                        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
                        <span class="ml-3 text-slate-500">데이터를 불러오는 중...</span>
                    </div>
                </div>

                <!-- Pagination -->
                <div class="border-t border-slate-200 px-6 py-4 flex items-center justify-between">
                    <div class="text-sm text-slate-500">
                        총 <span id="totalCount" class="font-semibold text-slate-700">0</span>개 항목
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="changePage(-1)" id="prevBtn" class="px-3 py-1.5 border border-slate-200 rounded-lg text-sm hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <span id="pageInfo" class="text-sm text-slate-600">1 / 1</span>
                        <button onclick="changePage(1)" id="nextBtn" class="px-3 py-1.5 border border-slate-200 rounded-lg text-sm hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Session Detail Modal -->
    <div id="sessionModal" class="hidden fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" onclick="closeModal()"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-2xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-3xl sm:w-full">
                <div class="bg-gradient-to-r from-indigo-600 to-purple-600 px-6 py-4">
                    <div class="flex items-center justify-between">
                        <h3 class="text-lg font-semibold text-white" id="modalTitle">세션 상세</h3>
                        <button onclick="closeModal()" class="text-white hover:text-gray-200">
                            <i class="fas fa-times text-xl"></i>
                        </button>
                    </div>
                </div>
                <div class="p-6" id="modalContent">
                    <!-- Modal content -->
                </div>
                <div class="bg-gray-50 px-6 py-4 flex justify-end gap-3">
                    <button onclick="closeModal()" class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">닫기</button>
                    <button onclick="deleteCurrentSession()" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700">
                        <i class="fas fa-trash-alt mr-2"></i>세션 삭제
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let currentKnoxId = '';
        let currentTab = 'sessions';
        let currentPage = 1;
        const pageSize = 10;
        let allSessions = [];
        let allUsers = [];
        let filteredSessions = [];
        let filteredUsers = [];
        let activityChart = null;
        let agentUsageChart = null;
        let currentSessionId = null;

        // 페이지 로드
        document.addEventListener('DOMContentLoaded', () => {
            const savedKnoxId = localStorage.getItem('adminKnoxId');
            if (savedKnoxId) {
                document.getElementById('knoxIdInput').value = savedKnoxId;
                currentKnoxId = savedKnoxId;
                loadAdminData();
            }
        });

        // Knox ID 변경
        document.getElementById('knoxIdInput').addEventListener('change', (e) => {
            currentKnoxId = e.target.value.trim();
            localStorage.setItem('adminKnoxId', currentKnoxId);
        });

        // API 헤더
        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'X-Knox-Id': currentKnoxId
            };
        }

        // 관리자 데이터 로드
        async function loadAdminData() {
            currentKnoxId = document.getElementById('knoxIdInput').value.trim();
            if (!currentKnoxId) {
                document.getElementById('loginMessage').classList.remove('hidden');
                return;
            }

            localStorage.setItem('adminKnoxId', currentKnoxId);
            document.getElementById('loginMessage').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');

            await Promise.all([
                loadStats(),
                loadSessions(),
                loadUsers()
            ]);
            
            updateTable();
        }

        // 통계 로드
        async function loadStats() {
            try {
                const response = await fetch('/admin/stats', { headers: getHeaders() });
                
                if (!response.ok) throw new Error('Unauthorized');
                
                const data = await response.json();
                
                renderStats(data);
                updateActivityChart(data);
                updateAgentUsageChart(data);
            } catch (error) {
                console.error('Stats error:', error);
                document.getElementById('statsGrid').innerHTML = `
                    <div class="col-span-full bg-red-50 border border-red-200 rounded-xl p-6 text-center text-red-700">
                        <i class="fas fa-exclamation-triangle mr-2"></i>통계를 불러올 수 없습니다 (관리자 권한 필요)
                    </div>
                `;
            }
        }

        // Render stats cards
        function renderStats(stats) {
            const statsData = [
                { label: '전체 세션', value: stats.total_sessions || 0, icon: 'fa-comments', color: 'indigo', borderColor: 'border-indigo-500' },
                { label: '전체 메시지', value: stats.total_messages || 0, icon: 'fa-envelope', color: 'purple', borderColor: 'border-purple-500' },
                { label: '고유 사용자', value: stats.unique_users || 0, icon: 'fa-users', color: 'emerald', borderColor: 'border-emerald-500' },
                { label: '오늘 세션', value: stats.today_sessions || 0, icon: 'fa-calendar-day', color: 'amber', borderColor: 'border-amber-500' },
                { label: '오늘 메시지', value: stats.today_messages || 0, icon: 'fa-paper-plane', color: 'cyan', borderColor: 'border-cyan-500' },
                { label: '활성 사용자', value: stats.active_users_24h || 0, icon: 'fa-bolt', color: 'rose', borderColor: 'border-rose-500' }
            ];
            
            document.getElementById('statsGrid').innerHTML = statsData.map(stat => `
                <div class="stat-card bg-white rounded-xl p-5 border-l-4 ${stat.borderColor} shadow-sm">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm font-medium text-slate-500 mb-1">${stat.label}</p>
                            <p class="text-2xl font-bold text-slate-800">${stat.value.toLocaleString()}</p>
                        </div>
                        <div class="w-12 h-12 bg-${stat.color}-100 rounded-xl flex items-center justify-center">
                            <i class="fas ${stat.icon} text-${stat.color}-600 text-xl"></i>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Load sessions
        async function loadSessions() {
            try {
                const response = await fetch('/admin/sessions?limit=1000', { headers: getHeaders() });
                if (!response.ok) throw new Error('Unauthorized');
                
                const data = await response.json();
                allSessions = data.sessions || [];
                filteredSessions = [...allSessions];
            } catch (error) {
                console.error('Sessions error:', error);
            }
        }

        // Load users
        async function loadUsers() {
            try {
                // Get users from session data
                const knoxIds = [...new Set(allSessions.map(s => s.knox_id))];
                allUsers = knoxIds.map(knoxId => {
                    const userSessions = allSessions.filter(s => s.knox_id === knoxId);
                    const msgCount = userSessions.reduce((sum, s) => sum + (s.message_count || 0), 0);
                    return {
                        knox_id: knoxId,
                        session_count: userSessions.length,
                        message_count: msgCount,
                        last_active: userSessions[0]?.updated_at,
                        is_admin: false
                    };
                });
                filteredUsers = [...allUsers];
            } catch (error) {
                console.error('Users error:', error);
            }
        }

        // Update table display
        function updateTable() {
            if (currentTab === 'sessions') {
                renderSessionsTable();
            } else {
                renderUsersTable();
            }
            updatePagination();
        }

        // Render sessions table
        function renderSessionsTable() {
            const data = filteredSessions;
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = data.slice(start, end);
            
            if (pageData.length === 0) {
                document.getElementById('tableContent').innerHTML = `
                    <div class="text-center py-20 text-slate-500">
                        <i class="fas fa-inbox text-4xl mb-4"></i>
                        <p>세션이 없습니다</p>
                    </div>
                `;
                return;
            }
            
            document.getElementById('tableContent').innerHTML = `
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">세션 ID</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">사용자</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Agent</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">메시지</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">상태</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">생성일</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">작업</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            ${pageData.map(s => `
                                <tr class="table-row-hover cursor-pointer" onclick="viewSessionDetail('${s.session_id}')">
                                    <td class="px-4 py-3 text-sm font-mono text-slate-600">${s.session_id?.slice(0, 16)}...</td>
                                    <td class="px-4 py-3 text-sm">${s.knox_id}</td>
                                    <td class="px-4 py-3 text-sm"><span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-${getAgentColor(s.initial_agent)}-100 text-${getAgentColor(s.initial_agent)}-800">${s.initial_agent?.replace('chatbot_', '').replace('_adk', '')}</span></td>
                                    <td class="px-4 py-3 text-sm">${s.message_count || 0}</td>
                                    <td class="px-4 py-3 text-sm">${s.is_active ? '<span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800"><i class="fas fa-circle text-xs mr-1"></i>활성</span>' : '<span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-800">비활성</span>'}</td>
                                    <td class="px-4 py-3 text-sm text-slate-500">${formatDate(s.created_at)}</td>
                                    <td class="px-4 py-3 text-sm">
                                        <button onclick="event.stopPropagation(); deleteSession('${s.session_id}')" class="text-red-600 hover:text-red-800"><i class="fas fa-trash-alt"></i></button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // Render users table
        function renderUsersTable() {
            const data = filteredUsers;
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = data.slice(start, end);
            
            if (pageData.length === 0) {
                document.getElementById('tableContent').innerHTML = `
                    <div class="text-center py-20 text-slate-500">
                        <i class="fas fa-inbox text-4xl mb-4"></i>
                        <p>사용자가 없습니다</p>
                    </div>
                `;
                return;
            }
            
            document.getElementById('tableContent').innerHTML = `
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Knox ID</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">세션 수</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">메시지 수</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">최근 활동</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">작업</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            ${pageData.map(u => `
                                <tr class="table-row-hover">
                                    <td class="px-4 py-3 text-sm font-medium">${u.knox_id}</td>
                                    <td class="px-4 py-3 text-sm">${u.session_count}</td>
                                    <td class="px-4 py-3 text-sm">${u.message_count}</td>
                                    <td class="px-4 py-3 text-sm text-slate-500">${formatDate(u.last_active)}</td>
                                    <td class="px-4 py-3 text-sm">
                                        <button onclick="filterByUser('${u.knox_id}')" class="text-indigo-600 hover:text-indigo-800"><i class="fas fa-filter"></i> 세션 보기</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // Get agent color
        function getAgentColor(agent) {
            if (agent?.includes('hr')) return 'pink';
            if (agent?.includes('tech')) return 'blue';
            return 'indigo';
        }

        // Switch tab
        function switchTab(tab) {
            currentTab = tab;
            currentPage = 1;
            
            // Update tab styles
            document.getElementById('tab-sessions').className = tab === 'sessions' ? 'tab-active pb-2 text-sm font-medium transition-colors' : 'tab-inactive pb-2 text-sm font-medium transition-colors';
            document.getElementById('tab-users').className = tab === 'users' ? 'tab-active pb-2 text-sm font-medium transition-colors' : 'tab-inactive pb-2 text-sm font-medium transition-colors';
            
            updateTable();
        }

        // Handle search
        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const filter = document.getElementById('searchFilter').value;
            
            if (currentTab === 'sessions') {
                filteredSessions = allSessions.filter(s => {
                    if (!query) return true;
                    if (filter === 'all') {
                        return s.session_id?.toLowerCase().includes(query) ||
                               s.knox_id?.toLowerCase().includes(query) ||
                               s.initial_agent?.toLowerCase().includes(query);
                    }
                    return s[filter]?.toLowerCase().includes(query);
                });
            } else {
                filteredUsers = allUsers.filter(u => {
                    return !query || u.knox_id?.toLowerCase().includes(query);
                });
            }
            
            currentPage = 1;
            updateTable();
        }

        // Filter by user
        function filterByUser(knoxId) {
            currentTab = 'sessions';
            document.getElementById('tab-sessions').className = 'tab-active pb-2 text-sm font-medium transition-colors';
            document.getElementById('tab-users').className = 'tab-inactive pb-2 text-sm font-medium transition-colors';
            document.getElementById('searchInput').value = knoxId;
            document.getElementById('searchFilter').value = 'knox_id';
            handleSearch();
        }

        // Update pagination
        function updatePagination() {
            const data = currentTab === 'sessions' ? filteredSessions : filteredUsers;
            const totalPages = Math.ceil(data.length / pageSize) || 1;
            
            document.getElementById('totalCount').textContent = data.length;
            document.getElementById('pageInfo').textContent = `${currentPage} / ${totalPages}`;
            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages;
        }

        // Change page
        function changePage(delta) {
            const data = currentTab === 'sessions' ? filteredSessions : filteredUsers;
            const totalPages = Math.ceil(data.length / pageSize) || 1;
            currentPage = Math.max(1, Math.min(totalPages, currentPage + delta));
            updateTable();
        }

        // View session detail
        async function viewSessionDetail(sessionId) {
            currentSessionId = sessionId;
            document.getElementById('modalTitle').textContent = `세션 상세: ${sessionId.slice(0, 16)}...`;
            document.getElementById('modalContent').innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin"></i> 로딩 중...</div>';
            document.getElementById('sessionModal').classList.remove('hidden');
            
            try {
                const response = await fetch(`/api/session/${sessionId}/history`, { headers: getHeaders() });
                if (!response.ok) throw new Error('Failed to load');
                
                const data = await response.json();
                const history = data.history || [];
                
                document.getElementById('modalContent').innerHTML = `
                    <div class="mb-4">
                        <p class="text-sm text-slate-500 mb-1"><strong>위임 체인:</strong> ${data.delegation_chain?.join(' → ') || '없음'}</p>
                    </div>
                    <div class="space-y-3 max-h-96 overflow-y-auto">
                        ${history.map(h => `
                            <div class="p-3 rounded-lg ${h.role === 'user' ? 'bg-blue-50 border-l-4 border-blue-500' : 'bg-gray-50 border-l-4 border-gray-400'}">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-xs font-medium ${h.role === 'user' ? 'text-blue-700' : 'text-gray-600'}">${h.role === 'user' ? '👤 사용자' : '🤖 Assistant'}</span>
                                    <span class="text-xs text-slate-400">${formatDate(h.created_at)}</span>
                                    <span class="text-xs bg-slate-200 px-2 py-0.5 rounded">${h.agent_id?.replace('chatbot_', '').replace('_adk', '')}</span>
                                </div>
                                <p class="text-sm text-slate-700 whitespace-pre-wrap">${h.content}</p>
                            </div>
                        `).join('') || '<p class="text-center text-slate-400 py-4">메시지가 없습니다</p>'}
                    </div>
                `;
            } catch (error) {
                document.getElementById('modalContent').innerHTML = `
                    <div class="text-center text-red-600 py-10">
                        <i class="fas fa-exclamation-circle"></i> 세션 상세를 불러올 수 없습니다
                    </div>
                `;
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('sessionModal').classList.add('hidden');
            currentSessionId = null;
        }

        // Delete current session from modal
        async function deleteCurrentSession() {
            if (currentSessionId) {
                await deleteSession(currentSessionId);
                closeModal();
            }
        }

        // Delete session
        async function deleteSession(sessionId) {
            if (!confirm('이 세션을 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) return;
            
            try {
                const response = await fetch(`/admin/session/${sessionId}`, {
                    method: 'DELETE',
                    headers: getHeaders()
                });
                
                if (response.ok) {
                    // Refresh data
                    await loadSessions();
                    await loadUsers();
                    handleSearch();
                    await loadStats();
                    showToast('세션이 삭제되었습니다', 'success');
                } else {
                    throw new Error('Delete failed');
                }
            } catch (error) {
                console.error('Delete error:', error);
                showToast('세션 삭제에 실패했습니다', 'error');
            }
        }

        // Export data
        function exportData() {
            const data = currentTab === 'sessions' ? filteredSessions : filteredUsers;
            const csvContent = convertToCSV(data);
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `adk_${currentTab}_${new Date().toISOString().slice(0, 10)}.csv`;
            link.click();
        }

        // Convert to CSV
        function convertToCSV(data) {
            if (data.length === 0) return '';
            const headers = Object.keys(data[0]).join(',');
            const rows = data.map(row => Object.values(row).map(v => `"${v}"`).join(','));
            return [headers, ...rows].join('\n');
        }

        // Update activity chart
        function updateActivityChart(statsData) {
            const ctx = document.getElementById('activityChart');
            if (!ctx) return;
            
            // Generate mock hourly data for demo
            const hours = Array.from({length: 24}, (_, i) => `${i}:00`);
            const data = hours.map(() => Math.floor(Math.random() * 50) + 10);
            
            if (activityChart) {
                activityChart.destroy();
            }
            
            activityChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: hours,
                    datasets: [{
                        label: '활성 세션',
                        data: data,
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false } },
                        y: { grid: { color: '#f1f5f9' }, beginAtZero: true }
                    }
                }
            });
        }

        // Update agent usage chart
        function updateAgentUsageChart(statsData) {
            const ctx = document.getElementById('agentUsageChart');
            if (!ctx) return;
            
            if (agentUsageChart) {
                agentUsageChart.destroy();
            }
            
            agentUsageChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['회사 전체', '인사지원', '기술지원'],
                    datasets: [{
                        data: [45, 30, 25],
                        backgroundColor: ['#6366f1', '#ec4899', '#3b82f6'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: {
                        legend: { position: 'bottom', labels: { padding: 20 } }
                    }
                }
            });
        }

        // Show toast notification
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg text-white font-medium fade-in z-50 ${
                type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-red-600' : 'bg-indigo-600'
            }`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'} mr-2"></i>${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Format date
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            
            if (minutes < 1) return '방금 전';
            if (minutes < 60) return `${minutes}분 전`;
            if (hours < 24) return `${hours}시간 전`;
            if (days < 7) return `${days}일 전`;
            
            return date.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
    </script>
</body>
</html>
