<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADK Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #333;
        }
        
        .header {
            background: #1a1a2e;
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        
        .admin-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .knox-input {
            padding: 8px 12px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #252542;
            color: white;
            font-size: 14px;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
        }
        
        .container {
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .stat-card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a2e;
        }
        
        .stat-card.active .stat-value {
            color: #667eea;
        }
        
        .stat-card.admin .stat-value {
            color: #f59e0b;
        }
        
        /* Section */
        .section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .section h2 {
            font-size: 18px;
            font-weight: 600;
        }
        
        /* Table */
        .table-container {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        
        th {
            font-weight: 600;
            color: #666;
            font-size: 13px;
            text-transform: uppercase;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge-admin {
            background: #fef3c7;
            color: #92400e;
        }
        
        .badge-user {
            background: #e0e7ff;
            color: #3730a3;
        }
        
        .badge-active {
            background: #d1fae5;
            color: #065f46;
        }
        
        .action-btn {
            padding: 4px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: white;
            cursor: pointer;
            font-size: 12px;
        }
        
        .action-btn:hover {
            background: #f5f5f5;
        }
        
        .action-btn.delete {
            border-color: #fca5a5;
            color: #dc2626;
        }
        
        .action-btn.delete:hover {
            background: #fee2e2;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Error */
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        /* Empty */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🔧 ADK 관리자 대시보드</h1>
        <div class="admin-info">
            <input type="text" class="knox-input" id="knoxIdInput" placeholder="Knox ID 입력">
            <button class="btn btn-primary" onclick="loadAdminData()">로그인</button>
        </div>
    </header>
    
    <div class="container">
        <div id="loginMessage" class="error-message" style="display: none;">
            관리자 Knox ID를 입력하고 로그인하세요
        </div>
        
        <div id="dashboard" style="display: none;">
            <!-- Stats -->
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card loading">
                    <div class="spinner"></div>
                </div>
            </div>
            
            <!-- Users Section -->
            <div class="section">
                <div class="section-header">
                    <h2>👥 사용자 목록</h2>
                </div>
                <div class="table-container" id="usersTable">
                    <div class="loading">로딩 중...</div>
                </div>
            </div>
            
            <!-- Sessions Section -->
            <div class="section">
                <div class="section-header">
                    <h2>💬 세션 목록</h2>
                </div>
                <div class="table-container" id="sessionsTable">
                    <div class="loading">로딩 중...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let currentKnoxId = '';
        
        // 페이지 로드
        document.addEventListener('DOMContentLoaded', () => {
            const savedKnoxId = localStorage.getItem('adminKnoxId');
            if (savedKnoxId) {
                document.getElementById('knoxIdInput').value = savedKnoxId;
                currentKnoxId = savedKnoxId;
                loadAdminData();
            }
        });
        
        // Knox ID 변경
        document.getElementById('knoxIdInput').addEventListener('change', (e) => {
            currentKnoxId = e.target.value.trim();
            localStorage.setItem('adminKnoxId', currentKnoxId);
        });
        
        // API 헤더
        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'X-Knox-Id': currentKnoxId
            };
        }
        
        // 관리자 데이터 로드
        async function loadAdminData() {
            currentKnoxId = document.getElementById('knoxIdInput').value.trim();
            if (!currentKnoxId) {
                document.getElementById('loginMessage').style.display = 'block';
                return;
            }
            
            localStorage.setItem('adminKnoxId', currentKnoxId);
            document.getElementById('loginMessage').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            
            await Promise.all([
                loadStats(),
                loadUsers(),
                loadSessions()
            ]);
        }
        
        // 통계 로드
        async function loadStats() {
            try {
                const response = await fetch('/api/admin/stats', {
                    headers: getHeaders()
                });
                
                if (!response.ok) throw new Error('Unauthorized');
                
                const data = await response.json();
                const stats = data.stats;
                
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card">
                        <h3>전체 사용자</h3>
                        <div class="stat-value">${stats.total_users || 0}</div>
                    </div>
                    <div class="stat-card admin">
                        <h3>관리자</h3>
                        <div class="stat-value">${stats.admin_count || 0}</div>
                    </div>
                    <div class="stat-card">
                        <h3>전체 세션</h3>
                        <div class="stat-value">${stats.total_sessions || 0}</div>
                    </div>
                    <div class="stat-card active">
                        <h3>활성 세션</h3>
                        <div class="stat-value">${stats.active_sessions || 0}</div>
                    </div>
                    <div class="stat-card">
                        <h3>전체 메시지</h3>
                        <div class="stat-value">${stats.total_messages || 0}</div>
                    </div>
                    <div class="stat-card">
                        <h3>사용자 메시지</h3>
                        <div class="stat-value">${stats.user_messages || 0}</div>
                    </div>
                `;
            } catch (error) {
                document.getElementById('statsGrid').innerHTML = `
                    <div class="error-message">통계를 불러올 수 없습니다 (관리자 권한 필요)</div>
                `;
            }
        }
        
        // 사용자 목록 로드
        async function loadUsers() {
            try {
                const response = await fetch('/api/admin/users', {
                    headers: getHeaders()
                });
                
                if (!response.ok) throw new Error('Unauthorized');
                
                const data = await response.json();
                const users = data.users || [];
                
                if (users.length === 0) {
                    document.getElementById('usersTable').innerHTML = `
                        <div class="empty-state">사용자가 없습니다</div>
                    `;
                    return;
                }
                
                document.getElementById('usersTable').innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Knox ID</th>
                                <th>권한</th>
                                <th>세션 수</th>
                                <th>메시지 수</th>
                                <th>가입일</th>
                                <th>최근 활동</th>
                                <th>작업</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${users.map(u => `
                                <tr>
                                    <td>${u.knox_id}</td>
                                    <td>
                                        <span class="badge ${u.is_admin ? 'badge-admin' : 'badge-user'}">
                                            ${u.is_admin ? '관리자' : '사용자'}
                                        </span>
                                    </td>
                                    <td>${u.session_count}</td>
                                    <td>${u.message_count}</td>
                                    <td>${formatDate(u.user_created)}</td>
                                    <td>${formatDate(u.last_message_time)}</td>
                                    <td>
                                        <button class="action-btn" onclick="viewUserSessions('${u.knox_id}')">
                                            세션 보기
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                document.getElementById('usersTable').innerHTML = `
                    <div class="error-message">사용자 목록을 불러올 수 없습니다</div>
                `;
            }
        }
        
        // 세션 목록 로드
        async function loadSessions() {
            try {
                const response = await fetch('/api/admin/sessions', {
                    headers: getHeaders()
                });
                
                if (!response.ok) throw new Error('Unauthorized');
                
                const data = await response.json();
                const sessions = data.sessions || [];
                
                if (sessions.length === 0) {
                    document.getElementById('sessionsTable').innerHTML = `
                        <div class="empty-state">세션이 없습니다</div>
                    `;
                    return;
                }
                
                document.getElementById('sessionsTable').innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>세션 ID</th>
                                <th>사용자</th>
                                <th>초기 Agent</th>
                                <th>메시지 수</th>
                                <th>상태</th>
                                <th>생성일</th>
                                <th>작업</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${sessions.map(s => `
                                <tr>
                                    <td>${s.session_id.slice(-12)}...</td>
                                    <td>${s.knox_id}</td>
                                    <td>${s.initial_agent}</td>
                                    <td>${s.message_count}</td>
                                    <td>
                                        <span class="badge ${s.is_active ? 'badge-active' : 'badge-user'}">
                                            ${s.is_active ? '활성' : '비활성'}
                                        </span>
                                    </td>
                                    <td>${formatDate(s.created_at)}</td>
                                    <td>
                                        <button class="action-btn delete" onclick="deleteSession('${s.session_id}')">
                                            삭제
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                document.getElementById('sessionsTable').innerHTML = `
                    <div class="error-message">세션 목록을 불러올 수 없습니다</div>
                `;
            }
        }
        
        // 사용자 세션 보기
        async function viewUserSessions(knoxId) {
            alert(`사용자 ${knoxId}의 세션 목록\n\nAPI: GET /api/admin/user/${knoxId}/sessions`);
        }
        
        // 세션 삭제
        async function deleteSession(sessionId) {
            if (!confirm('이 세션을 삭제하시겠습니까?')) return;
            
            try {
                const response = await fetch(`/api/session/${sessionId}`, {
                    method: 'DELETE',
                    headers: getHeaders()
                });
                
                if (response.ok) {
                    loadSessions();
                    loadStats();
                }
            } catch (error) {
                alert('삭제 실패');
            }
        }
        
        // 날짜 포맷
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('ko-KR', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
    </script>
</body>
</html>
